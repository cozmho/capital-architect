name: Feature Request
description: Suggest an enhancement with clear scope and success criteria.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: Setters cannot quickly prioritize leads by intake source and tier.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the change and expected user flow.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List measurable criteria for completion.
      placeholder: |
        - Dashboard shows source filter chips
        - Filter state persists in URL
        - Works on mobile
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impacted Areas
      description: Note probable paths such as auth, Prisma, routing, API, or docs.
      placeholder: app/dashboard/admin/page.tsx, app/api/intake/route.ts
    validations:
      required: true

  - type: checkboxes
    id: risk
    attributes:
      label: Risk Flags
      options:
        - label: This feature changes auth or route behavior
        - label: This feature requires Prisma schema changes
        - label: This feature requires API contract changes

  - type: textarea
    id: notes
    attributes:
      label: Additional Context
      description: Links, mockups, or examples.
