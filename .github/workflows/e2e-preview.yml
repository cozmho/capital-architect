name: E2E Preview Smoke

on:
  push:
  pull_request:

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      CLERK_TESTING_TOKEN: ${{ secrets.CLERK_TESTING_TOKEN }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_IS_ADMIN: ${{ vars.TEST_USER_IS_ADMIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      - name: Build preview artifact
        run: npx vercel build --token=${{ env.VERCEL_TOKEN }}

      - name: Deploy preview and capture URL
        id: deploy
        run: |
          deployment_url=$(npx vercel deploy --prebuilt --yes --token=${{ env.VERCEL_TOKEN }})
          if [[ "$deployment_url" != http* ]]; then
            deployment_url="https://$deployment_url"
          fi
          echo "BASE_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "preview_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "Preview URL: ${{ steps.deploy.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"
