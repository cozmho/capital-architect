name: Lint PowerShell Scripts

on:
  push:
    paths:
      - 'scripts/vscode/**'
      - '.github/workflows/lint-powershell.yml'
  pull_request:
    paths:
      - 'scripts/vscode/**'
      - '.github/workflows/lint-powershell.yml'

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Lint update-extensions.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path scripts/vscode/update-extensions.ps1 `
            -Severity Error,Warning `
            -ExcludeRule PSAvoidUsingWriteHost

          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "update-extensions.ps1: no issues found." -ForegroundColor Green

      - name: Lint install-extensions.ps1
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path scripts/vscode/install-extensions.ps1 `
            -Severity Error,Warning `
            -ExcludeRule PSAvoidUsingWriteHost

          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host "install-extensions.ps1: no issues found." -ForegroundColor Green

      - name: Dry-run help mode — update-extensions.ps1
        shell: pwsh
        run: |
          Get-Help .\scripts\vscode\update-extensions.ps1 -Full | Out-Null
          Write-Host "update-extensions.ps1 help loaded successfully." -ForegroundColor Green

      - name: Dry-run help mode — install-extensions.ps1
        shell: pwsh
        run: |
          Get-Help .\scripts\vscode\install-extensions.ps1 -Full | Out-Null
          Write-Host "install-extensions.ps1 help loaded successfully." -ForegroundColor Green
